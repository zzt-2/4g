boundary_guards:
  - "页面直接消费各 feature public API，不经过 settings feature 中转（R7）。"
  - "不改 settings feature core（types/defaults/normalize/validation/service/selector）。"
  - "connection 更新串口参数走 connect()（内部 upsertConfig），无独立 updateConfig 方法。"
  - "持久化由子组件保存 handler 显式调用 runtime.persistence.saveXxx()。"
  - "占位分组内联在 SettingsPage.vue，不建独立文件。"
  - "不做 Display/Status/Advanced 分组的实际功能。"

