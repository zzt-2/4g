    status: pass
    note: "build 整体有 pre-existing rollup 错误，但与 checksum 无关；checksum 相关 vitest 全过"

  - action: "算法层：新增 checksumSum32 / checksumSum16 纯函数（4B / 2B word 累加，DataView 读 word，>>> 0 / & 0xffff 返回）"
    exit_signal: "新单测覆盖：BE / LE / overflow mask / 单 word / 多 word"
    status: pass

  - action: "派发层：ChecksumOptions 加 bigEndian?: boolean；calculateChecksum 加 case 'sum32' / 'sum16' 分支"
    exit_signal: "calculateChecksum(bytes, 'sum32', { bigEndian: true }) 与独立函数结果一致"
    status: pass

  - action: "对齐校验：applyBuildPostPatch 在 method 解析后立即用 rangeLength (= endField.offset + endField.length - startField.offset) 校验对齐，不依赖 slice 结果；sum32 要求 %4==0、sum16 要求 %2==0，违者 push send.build.checksumRangeUnaligned error 并 continue"
    exit_signal: "新单测覆盖：sum32 非 4B / sum16 非 2B / 正好对齐 / sum8 等不受影响"
    status: pass

  - action: "端序贯通：applyBuildPostPatch 调 calculateChecksum 时传入 { bigEndian: field.bigEndian }"
    exit_signal: "BE 字段和 LE 字段同帧各自正确累加"
    status: pass

  - action: "集成测试：新增 send-checksum-sum-word.spec.ts，fixture frame 含 sum32 / sum16 checksum 字段，round-trip 验证 checksum 字节"
    exit_signal: "集成测试通过；不依赖 setTimeout；不复制生产代码"
    status: pass

  - action: "UI 手工验证：FrameFieldEditorDialog → 启用 checksum → method 下拉显示 SUM32 / SUM16 选项（来自 CHECKSUM_METHOD_OPTIONS 自动跟随）"
    exit_signal: "浏览器手动确认两个新选项可见且可选"
    status: 手工
    note: "本轮无浏览器交互环境；CHECKSUM_METHOD_OPTIONS 经 CHECKSUM_METHODS.map(...) 自动生成，新选项会暴露。需控制方在 dev 服务器手工确认"

