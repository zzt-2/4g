## 实施约束（C1-C4）

### C1: Composable 抽取

- [ ] useFrameList composable 存在，封装 query + shallowRef + watch + refreshList (static)
- [ ] useFrameEditor composable 存在，封装 workingFrame + dirty + save + route guard (static)
- [ ] useFieldEditor composable 存在，封装 fieldEditorOpen + editingIndex + CRUD (static)
- [ ] useAsyncOperation composable 存在于 shared/composables/，封装 operatingIds + execute + notify (static)
- [ ] 页面组件 <script setup> ≤ 30 行（编排 + 渲染）(static)

### C2: 组件结构

- [ ] FrameEditorPage provide frameId + allFields context (static)
- [ ] FrameFieldExpressionConfig inject 消费 context，不通过 prop 接收 frameId/allFields (static)
- [ ] autoConnect QToggle 在 v-if 块外，不随连接类型重复 (static)
- [ ] FrameFieldEditorDialog 维护 fieldDirty，关闭/切换时有确认提示 (manual)
