### 前置类型变更

- [ ] BaseTransportConfig 新增 `autoConnect?: boolean` 字段 (static)

### Phase 1 限制（待 Phase 2 实现）

- 连接配置仅内存态，不跨重启持久化
- autoConnect 仅在本次会话生效，重启后丢失
- 连接配置不可编辑，只能新建+删除
- Phase 2 需实现：配置持久化（通过 settings 或独立存储）+ autoConnect 跨重启 + 连接编辑

