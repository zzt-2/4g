    title: UI 与 Feature Bug 集中修复
    status: active
    created: 2026-06-10
    last_updated: 2026-06-24
    description: 发送帧页面状态丢失、UDP 发送失败、IP 显示错误等多功能交叉 bug 的根因分析和修复。S002/D001 拍板 task 参数变化机制(连续累积+字段级可变参数分开做),H008 交接字段级可变参数实施。H008 实施完成(D002):两问题合一,字段级可变参数 + 表达式连续累积(复用帧侧 self-ref + task 补 writeback) + 顺手修 progress/maxIterations 两 bug。S003 续接(D003):可变参数输入清空 bug 根因 Vue props 异步回流 + 链式 emit stale 覆盖,确立子组件单次 emit 原则。S004(D004):三个 UI 修复——进度计数按发送次数计(双维度 steps+sends)、保存按钮去 disable、发送失败悬停显示具体报错。S005(D005/D006):串口两问题——配置项写死(透传链断 3 处补全 + NewConnectionDialog 加 4 q-select)+ 打包检测不到(npmRebuild:true + 枚举失败 throw 透传 renderer devtool)。S007(06-21):接收帧匹配计数到 48 累计型卡死——根因 collectEventsAfter 滚动窗口增量满后恒 [],单点修 applyEvents 返回本轮新事件;无 D###。S009(06-22,D009):Electron 主窗口壳层改造——devTools 默认开(dev-only)+ 无边框窗口(frame:false)+ 自定义三按钮。S010(06-22):指令接入页 UI 重做——1463 行拆 page 薄壳 + 14 子组件,新增 rw-segmented/rw-segmented--sub。S011(06-23):任务管理页 UI 重做——brainstorm(10 问)定 tab 嵌套保留换皮 + 去 H1 + 执行页加 KPI bar + 右栏拓宽 gap-6 + 拆组件 page 薄壳 + components/{templates,executions}/ 子目录 + dialog 独立。用户推翻 H009 预判实施用 frontend-design 非 writing-plans。新增 9 子组件,删两巨石单文件(753/832)。dialog 走 patchField emit(D003,治 vue/no-mutating-props)。monitor 统一本次不做记后续。lint 0 新增 + task 271/271 + command-ingress/send 330/330 全过。无 D###。S012(06-23,D010):接收帧高频卡顿性能优化——trace 锁 timer#4=routingTick setInterval(300-430ms/次)。Phase 1 证据反转:Node 基准证伪"routingTick 回调重活"(12帧仅5.5ms),实证根因是 storage appendLocalRecords 每帧全量深拷贝+排序=O(N·M)(2000 records 单 tick 62ms,反推 trace 300ms 自洽)。治本 append-only 快速路径(canAppendInOrderFast)+ 轻量 accessor。2000 records 单 append 34ms→18.65ms(1.8x),端到端 62ms→34ms。顺带清 9 处 debug log + 修 pre-existing 测试基建(vitest 加 vue 插件)。tsc 0 / lint 0。待用户目标机实测。S012 续接(06-23,D010-C):第三症状"切走再回来卡"(多人独立复现)——根因 webPreferences 默认 backgroundThrottling:true 节流失焦 routingTick→堆积→回前台惊群,治本 backgroundThrottling:false 一行。待用户重启 dev server 实测(main 进程改动 HMR 不生效)。S013(06-24):编辑实例弹窗深度重设计——双输入框联动/计算按钮/description hover tooltip/公式翻译/bytes 单 Hex 框,send 189/189,见 D011(右栏高度 5 次失败搁置)。S014(06-24):任务模板等待条件全覆盖测试数据 + 实测——造 3 receive 测试帧 + 21 任务模板(9 operator 全覆盖 + and/or + 3 onTimeout + 永久等待 + 中断 + sourceId + repeat.until + exitCondition),两文件经应用真实导入路径验证可导入,31 集测跑真实执行路径全过。发现 1 真 bug(runtime/feature-wiring.ts:146-152 createTaskService 未传 fieldValueProvider→repeat.until/exitCondition 生产失效,wait-condition step 不受影响)+ 2 行为澄清(onTimeout=fail+stop 终态 stopped 非 failed / 中断 step 不记 result)。无 D###。

