    description: 基于甲方 V1.0.1 接口文档（31 接口），分析 northbound 对接闭环、拍板决策、gap 清单、待甲方确认项。D001(caseTemplate↔TaskTemplate)+D002(getTestCaseAll 数据源=模板加上报标记,部分被 D004 推翻)+D003(我们是 LAS 子系统,翻译双向同源)+D004(映射表归 command-ingress,推翻 D002 耦合设计)+D005(auth 出站请求加显式前置校验,防 undefined 被 JSON.stringify 静默吞)确立。setTestTask 协议层对齐+代码清理完成。HAR 是 ka 数据,翻译层方向已正(简单工程非领域密集)。H009 落地(S012):task 耦合回滚 + command-ingress 建映射表 + 翻译器接口改 (EncodeSource+mapping) + 用例目录 UI 改造。S013 落地:登录 password 缺失修复(S011 同 bug 复发,根因 persistConfig 从 S008 起漏存 password)+ auth.ts 两层防御(D005)+ UI password 必填校验 + 离线研究。联调实测:login/heartbeat/getSubSysState/getTestCaseAll(请求到达)✓ 通(入站真实拓扑=甲方后端在桥接虚拟机 10.15.5.93,base_url=10.15.4.54:5001+5001 防火墙规则)。S013 联调顺带发现 S012 遗留 blocker → H010 交接 S014:getTestCaseAll 响应 datas 永远空,根因 feature-wiring.ts:183-189 createNorthboundService 漏传 testCaseConfig(northbound-service.ts:533 永远 return null),单测手动传 testCaseConfig 掩盖了 runtime 漏传。S014 完成(第一层):testCaseConfig 漏接线修复——deriveTestCaseConfig 从 activeConfig.subSysId 取真源+激光默认常量,删 options.testCaseConfig 死字段。northbound-service.spec 42/42,lint 0,全量 11 failed 全 baseline。⚠️ S014 续接发现第二层根因(D006 协议理解错误):datas 该走 FTP 文件非 HTTP 响应体字段(文档铁证 03-用例管理.md L5/L73-91/L158-517),代码 L586 把 datas 塞响应体是 S006 mock 残留。D006 拍板正确流程:getTestCaseAll→序列化{datas:[...]}→FTP 上传 config.ftp/basePath/日期/testcase_all.json→回应 statusCode:1 无 datas→调 fileTranslationComplete 通知。4 个代码 gap + FTP 配置 UI(DockingConfigForm 加 5 字段,顺带打通 TestReport 上传链)留下一轮(S015)。fileType/fileIndex/接口版本(testDataFile vs 通用 fileTranslationComplete)联调确认。教训:理解协议先读文档不要先读代码。

