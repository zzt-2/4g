    description: 发送帧页面状态丢失、UDP 发送失败、IP 显示错误等多功能交叉 bug 的根因分析和修复。S002/D001 拍板 task 参数变化机制(连续累积+字段级可变参数分开做),H008 交接字段级可变参数实施。H008 实施完成(D002):两问题合一,字段级可变参数 + 表达式连续累积(复用帧侧 self-ref + task 补 writeback) + 顺手修 progress/maxIterations 两 bug。S003 续接(D003):可变参数输入清空 bug 根因 Vue props 异步回流 + 链式 emit stale 覆盖,确立子组件单次 emit 原则。S004(D004):三个 UI 修复——进度计数按发送次数计(双维度 steps+sends)、保存按钮去 disable、发送失败悬停显示具体报错。S005(D005/D006):串口两问题——配置项写死(9d35a5f 半截,透传链断 3 处,本次补全 platform-bridge/real-serial-adapter/serial-handlers + NewConnectionDialog 加 4 q-select,flowControl 语义层转 v13 布尔,dataBits 不加 9)+ 打包检测不到(npmRebuild:false 改 true + postinstall electron-rebuild + 枚举失败 throw 透传 renderer devtool)。connection 65/65 过,待用户目标机验证打包。S007(06-21):接收帧匹配计数到 48 累计型卡死——根因 collectEventsAfter 用数组下标取 EVENT_LIMIT=50 滚动窗口增量,满后 slice(50) 恒 [] 导致 routingTick 路由冻结(48=50−2,connect 占 2 槽);单点修 applyEvents 返回本轮新事件;无 D###;独立问题 B 拆帧异常(splitBySyncWord/"长度三次")未修留后续。

