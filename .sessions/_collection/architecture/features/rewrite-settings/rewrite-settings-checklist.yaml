    status: pending

  - item: "storage 配置验收：默认值、normalize 空输入/部分输入/旧 key、validate 非法值/非法类型、selector 隔离、update/reset"
    source: 验收场景
    status: pending

  - item: "general 配置验收：默认值、normalize 部分输入、validate 负数/零/非法类型、update/reset"
