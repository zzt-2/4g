# command-ingress implementation checklist
# 直接合同：command-ingress-design.md
# 状态：ready for impl（W1 可先行，W2/W3 依赖 task-real）

wave-1-core-protocol:
  description: Core 类型、接口、状态管理、SCOE 协议适配器、迁移脚本、northbound stub
  dependency: none（可与 task-real impl 并行）
  items:
    - id: C1
      status: done
      title: TransportEventConsumer 接口 + ConsumerResult 类型
      section: "design §1.1"
      files:
        - rewrite/src/runtime/consumer-chain.ts (new)
      acceptance: 接口定义与 design §1.1 完全一致，类型编译通过

    - id: C2
      status: done
      title: ProtocolAdapter 接口 + ParsedCommand 类型
      section: "design §2.1"
      files:
        - rewrite/src/features/command-ingress/core/protocol-adapter.ts (new)
      acceptance: canHandle/parse/consume 接口签名与 design 一致

    - id: C3
      status: done
      title: CommandHandler 签名 + CommandContext DI
      section: "design §4.1"
      files:
        - rewrite/src/features/command-ingress/core/handler.ts (new)
      acceptance: CommandContext 包含 9 个字段（含 sendService），CommandResult 含 success/error/taskId

    - id: C4
      status: done
      title: CommandIngressState + state container
      section: "design §8.1"
      files:
        - rewrite/src/features/command-ingress/core/state.ts (new)
      acceptance: State 包含 13 个字段，state container 支持读写分离

    - id: C5
      status: done
      title: CommandIngressStateReader / StateWriter 接口
      section: "design §8.5"
      files:
        - rewrite/src/features/command-ingress/core/state.ts
      acceptance: Reader 只读暴露，Writer 支持所有状态更新操作（含 tickSecond）

    - id: C6
      status: done
      title: 4 个 selector 实现
      section: "design §8.4"
      files:
        - rewrite/src/features/command-ingress/selectors/command-ingress-selectors.ts (new)
        - rewrite/src/features/command-ingress/selectors/index.ts (new)
      acceptance: 所有 selector 返回 readonly 深拷贝快照，单测通过

    - id: C7
      status: done
      title: ScoeProtocolAdapter 实现（canHandle + parse）
      section: "design §2.2"
      files:
        - rewrite/src/features/command-ingress/adapters/scoe-protocol-adapter.ts (new)
      acceptance: consume() 返回 { consumed, remaining }，canHandle 实现两阶段状态机

    - id: C8
      status: done
      title: 功能码验证
      section: "design §2.2.2"
      files:
        - rewrite/src/features/command-ingress/adapters/scoe-protocol-adapter.ts
      acceptance: 4 字节功能码校验（scoeIdentifier + commandCode + 0xAA0xAA），fixture 测试通过

    - id: C9
      status: done
      title: 校验和验证（sum % 256）
      section: "design §2.2.3"
      files:
        - rewrite/src/features/command-ingress/adapters/scoe-protocol-adapter.ts
      acceptance: 多 checksum 配置支持，边界值测试通过

    - id: C10
      status: done
      title: 参数提取和 resolve
      section: "design §6"
      files:
        - rewrite/src/features/command-ingress/adapters/scoe-protocol-adapter.ts
      acceptance: offset/length → hex → receiveCode 匹配 → option.value，normalize 规则测试通过

    - id: C11
      status: done
      title: 两阶段状态机
      section: "design §8.2"
      files:
        - rewrite/src/features/command-ingress/adapters/scoe-protocol-adapter.ts
      acceptance: scoeFramesLoaded=false 时只匹配 LOAD，true 时全部可识别

    - id: C22
      status: done
      title: 迁移脚本
      section: "design §9.6"
      files:
        - rewrite/scripts/migrate-scoe-config.ts (new)
      acceptance: 输入旧 JSON → 输出新 ScoeCommandConfig[] JSON，字段映射与 §9.1-9.5 一致

    - id: C23
      status: done
      title: operator 枚举映射
      section: "design §9.5"
      files:
        - rewrite/scripts/migrate-scoe-config.ts
      acceptance: 旧 MatchOperator 6 值全部正确映射到 ComparisonOperator

    - id: C26
      status: done
      title: NorthboundProtocolAdapter stub
      section: "design §10, checklist P5"
      files:
        - rewrite/src/features/command-ingress/adapters/northbound-protocol-adapter.ts (new)
      acceptance: canHandle() 返回 false，接口占位，编译通过

wave-2-handlers:
  description: 6 种 handler、TaskDefinition 翻译、确认帧、状态机轮询、连接断开
  dependency: task-real impl 完成（ScheduleDriver、FieldVariation、ConditionTerm、统一 config 字段名）
  items:
    - id: C12
      status: done
      title: 6 种 handler 实现
      section: "design §4.3"
      files:
        - rewrite/src/features/command-ingress/core/handler.ts
        - rewrite/src/features/command-ingress/handlers/ (new dir)
      acceptance: handlerMap 注册 6 个 handler，每个 handler 有前置条件检查，单测通过

    - id: C13
      status: done
      title: SEND_FRAME → TaskDefinition 翻译
      section: "design §5.1"
      files:
        - rewrite/src/features/command-ingress/core/task-builder.ts (new)
      acceptance: 构造的 TaskDefinition 使用 schedule: { kind: 'immediate' } + config 统一字段名 + userFieldValues

    - id: C14
      status: done
      title: READ_FILE_AND_SEND → TaskDefinition 翻译
      section: "design §5.2"
      files:
        - rewrite/src/features/command-ingress/core/task-builder.ts
      acceptance: 使用 fieldVariations + schedule: { kind: 'timer' } + stopCondition.maxIterations

    - id: C15
      status: done
      title: 完成条件参数化索引对齐
      section: "design §5.3"
      files:
        - rewrite/src/features/command-ingress/core/task-builder.ts
      acceptance: buildWaitConditions 返回 ConditionTerm[]，参数化模式 findIndex + options[index] 对齐

    - id: C16
      status: done
      title: 确认帧发送
      section: "design §7"
      files:
        - rewrite/src/features/command-ingress/core/handler.ts
      acceptance: onSettled 成功后通过 sendService.execute() 发送确认帧，使用 userFieldValues

    - id: C17
      status: done
      title: 每秒状态机轮询
      section: "design §8.3"
      files:
        - rewrite/src/features/command-ingress/services/status-timer.ts (new)
      acceptance: tickSecond() 实现完整 3 步逻辑，不含 checkSatelliteLoad/sendScoeFrames

    - id: C18
      status: done
      title: 连接断开清理
      section: "design §12"
      files:
        - rewrite/src/features/command-ingress/services/command-ingress-service.ts (new)
      acceptance: tracking map 记录 connectionId → taskInstanceIds，断开时 stopTask 关联 task

