## 验证方式说明

- **static**: 代码静态分析/lint 可验证
- **static lint**: pnpm -C rewrite lint 可验证
- **static review**: 人工 code review 验证
- **manual**: 手工操作验证
- **runtime**: 运行时性能监控验证
- **runtime performance**: 压测/性能工具验证
- **vitest**: 单元测试验证
